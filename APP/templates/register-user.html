<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <!-- ... otras etiquetas meta ... -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CONEXIÓN A STATIC -->
    <!-- 1. Estilos generales y variables de color -->
    <link rel="stylesheet" href="{% static 'estilo.css' %}">
    <!-- 2. Estilos específicos para formularios neumórficos -->
    <link rel="stylesheet" href="{% static 'estilo-forms.css' %}">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

</head>
<body>

    <div class="page-center-wrapper">
        <div class="neumo-container">
            
            <div class="text-center mb-4">
                <div class="circle-icon" style="background-color: var(--color-rojoactivo);">
                    <i class="bi bi-person-add"></i>
                </div>
                <h3 class="text-white mb-0">Registro</h3>
                <p class="text-white-50 small">Usuarios</p>
            </div>
            {% if form.errors %}
            <div class="alert alert-neumo alert-dismissible fade show" role="alert">
                <div>
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <strong>Error:</strong> Por favor verifica los datos ingresados.
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="form-floating mb-3">
                    <input type="text" name="CI" class="form-control" id="regCedula" placeholder="Cédula" required>
                    <label for="regCedula">
                        <div class="label-content">
                            <i class="bi bi-person-badge"></i> <span>Cédula</span>
                        </div>
                    </label>
                </div>
        
                <div class="form-floating mb-3">
                    <input type="text" name="NAME" class="form-control" id="regNombre" placeholder="Nombre" required>
                    <label for="regNombre">
                        <div class="label-content">
                            <i class="bi bi-person"></i> <span>Nombre</span>
                        </div>
                    </label>
                </div>
        
                <div class="form-floating mb-3">
                    <input type="text" name="SURNAME" class="form-control" id="regApellido" placeholder="Apellido" required>
                    <label for="regApellido">
                        <div class="label-content">
                            <i class="bi bi-person"></i> <span>Apellido</span>
                        </div>
                    </label>
                </div>
        
                <div class="form-floating mb-3">
                    <input type="text" name="DIRECTION" class="form-control" id="regDir" placeholder="Dirección" required>
                    <label for="regDir">
                        <div class="label-content">
                            <i class="bi bi-geo-alt"></i> <span>Dirección</span>
                        </div>
                    </label>
                </div>
        
                <div class="form-floating mb-3">
                    <input type="date" name="BIRTHDATE" class="form-control" id="regFecha" placeholder="Fecha" required>
                    <label for="regFecha">
                        <div class="label-content">
                            <i class="bi bi-calendar-date"></i> <span>Fecha de nacimiento</span>
                        </div>
                    </label>
                </div>
        
                <div class="form-floating mb-3">
                    <input type="text" name="USERNAME" class="form-control" id="regUser" placeholder="Usuario" required>
                    <label for="regUser">
                        <div class="label-content">
                            <i class="bi bi-person-circle"></i> <span>Usuario</span>
                        </div>
                    </label>
                </div>
        
                <div class="form-floating mb-3 password-wrapper">
                    <input type="password" name="PASSWORD" class="form-control" id="regPass" placeholder="Contraseña" required>
                    <label for="regPass">
                        <div class="label-content">
                            <i class="bi bi-lock"></i> <span>Contraseña</span>
                        </div>
                    </label>
                    <button type="button" class="toggle-password" onclick="togglePassword('regPass', 'eyeIcon1')">
                        <i class="bi bi-eye" id="eyeIcon1"></i>
                    </button>
                </div>
                
                <div class="form-floating mb-4 password-wrapper">
                    <input type="password" class="form-control" id="regPassConf" placeholder="Confirmar">
                    <label for="regPassConf">
                        <div class="label-content">
                            <i class="bi bi-lock-fill"></i> <span>Confirmar Contraseña</span>
                        </div>
                    </label>
                    <button type="button" class="toggle-password" onclick="togglePassword('regPassConf', 'eyeIcon2')">
                        <i class="bi bi-eye" id="eyeIcon2"></i>
                    </button>
                </div>
        
                <div class="d-grid mt-2">
                    <button type="submit" class="btn btn-neumo-full2">Registrarse</button>
                </div>
            </form>

            <div class="mt-4 text-center">
                <p class="text-white-50 small mb-0">
                    ¿Ya tienes una cuenta? 
                    <a href="{% url 'login_usuario' %}" class="link-register ms-1">Inicia Sesion aquí</a>
                </p>
            </div>
    
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
    
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }
    </script>

</body>
</html>
