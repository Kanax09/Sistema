{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/estilo.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container my-3">
        <div class="row align-items-center">
            <div class="col-12 col-md-2">
                <a href="{% url 'admin_catalogo' %}" class="btn btn-glow-red rounded-circle p-2 d-flex align-items-center justify-content-center" 
                   style="width: 45px; height: 45px;">
                    <i class="bi bi-arrow-left fs-4"></i>
                </a>
            </div>
            <div class="col-12 col-md-8 d-flex justify-content-center align-items-center">
                <div class="circle-cart me-3">
                    <i class="bi bi-bag-check-fill"></i>
                </div>
                <h2 class="mb-0 fw-bold text-white">Panel De Pedidos</h2>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row g-4"> 
            <div class="col-12">
                <div class="card custom-container barra neumorphic">
                    <div class="card-header text-white shadow">
                        <h5 class="mb-0">PEDIDOS REALIZADOS</h5>
                    </div>
                    <div class="card-body scroll-box">
                        <div class="row mb-3">
                            <div class="col-12 d-flex justify-content-end mb-1">
                                <div class="search-pill">
                                    <i class="bi bi-search"></i>
                                    <input type="text" id="buscadorPedidos" placeholder="Buscar por cliente o cédula...">
                                </div>
                            </div>
                        </div>
                        <div class="row g-3" id="contenedorPedidos">
                            {% for pedido in pedidos %}
                            <div class="col-12 col-sm-6 col-lg-3 mb-3 item-pedido" 
                                 data-cliente="{{ pedido.cliente_nombre|lower }}" 
                                 data-ci="{{ pedido.cliente_ci }}">
                                <div class="neumo-card h-100 p-3">
                                    <div class="col-12 d-flex justify-content-center align-items-center">
                                        <div class="circle-cart mb-3">
                                            <i class="bi bi-person-badge-fill"></i>
                                        </div>
                                    </div>
                                    <div class="product-id-banner" style="color: var(--color-naranja);">
                                        ID: {{ pedido.id }}
                                    </div>
                                    <div class="card-body pt-0">
                                        <h6 class="fw-bold mb-1 text-white">{{ pedido.cliente_nombre }}</h6>
                                        <div class="d-flex align-items-center mb-3">
                                            <span class="text-white-50 small me-2">cédula</span>
                                            <span class="badge border-0" style="background-color: var(--color-rojoinactivo);">{{ pedido.cliente_ci }}</span>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mb-3">
                                            <div class="fw-semibold fs-5" style="color: var(--color-naranja);">${{ pedido.total }}</div>
                                            <span class="text-white-50 small me-2">{{ pedido.fecha }}</span>
                                        </div>
                                        <div class="mt-4">
                                            <a href="{% url 'detalle_pedido' pedido.id %}" class="btn btn-neumo-full3">
                                                <i class="bi bi-eye-fill"></i> Ver
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {% empty %}
                            <p class="text-white">No hay pedidos registrados.</p>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Búsqueda en vivo para pedidos
        document.getElementById('buscadorPedidos').addEventListener('input', function() {
            const filtro = this.value.toLowerCase();
            document.querySelectorAll('.item-pedido').forEach(item => {
                const nombre = item.dataset.cliente;
                const ci = item.dataset.ci;
                const coincide = nombre.includes(filtro) || ci.includes(filtro);
                item.style.display = coincide ? '' : 'none';
            });
        });
    </script>
</body>
</html>
